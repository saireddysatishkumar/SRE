# BLUE VERSION (Stable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-blue
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      version: blue
  template:
    metadata:
      annotations:
        # SRE DEFENSE: Tell Prometheus to scrape this pod
        prometheus.io/scrape: "true"
        prometheus.io/port: "5678"
        prometheus.io/path: "/"
      labels:
        app: myapp
        version: blue
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo
        args: ["-text=Welcome to the BLUE Version"]
        ports:
        - containerPort: 5678
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
# GREEN VERSION (New Release)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-green
  namespace: default
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: myapp
      version: green
  template:
    metadata:
      annotations:
        # SRE DEFENSE: Monitor the new release closely
        prometheus.io/scrape: "true"
        prometheus.io/port: "5678"
        prometheus.io/path: "/"
      labels:
        app: myapp
        version: green
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo
        args: ["-text=Welcome to the GREEN Version"]
        ports:
        - containerPort: 5678
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
# THE SERVICE (Azure Load Balancer)
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  namespace: default
spec:
  type: LoadBalancer 
  selector:
    app: myapp
    # version: blue  <-- COMMENT THIS OUT to enable Canary (2 Blue / 1 Green)
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678