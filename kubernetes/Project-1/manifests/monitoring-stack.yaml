apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel
  template:
    metadata:
      labels:
        app: otel
    spec:
      # CRITICAL: This allows the pod to sit on your tainted "monitor" nodes
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "monitoring"
        effect: "NoSchedule"
      
      # CRITICAL: This forces the pod to your "monitor" pool specifically
      nodeSelector:
        role: "monitoring"

      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector:latest
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi