# BLUE VERSION (The Stable Release)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-blue
  namespace: default
spec:
  replicas: 3  # Increased for Canary weight (75% of traffic)
  selector:
    matchLabels:
      app: myapp
      version: blue
  template:
    metadata:
      labels:
        app: myapp
        version: blue
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo
        args: ["-text=Welcome to the BLUE Version"]
---
# GREEN VERSION (The Canary Release)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-green
  namespace: default
spec:
  replicas: 1  # Reduced for Canary weight (25% of traffic)
  selector:
    matchLabels:
      app: myapp
      version: green
  template:
    metadata:
      labels:
        app: myapp
        version: green
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo
        args: ["-text=Welcome to the GREEN Version"]
---
# THE SERVICE (The entry point)
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: myapp
    # version: blue  # <--- COMMENTED OUT: Removing this enables Canary mode
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678
